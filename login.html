<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - LifeFlow</title>
  <link rel="stylesheet" href="../css/style.css"/>
  <style>
    body { display:flex; min-height:100vh; align-items:center; justify-content:center; background:var(--dark); }
    .login-wrap { width:100%; max-width:420px; padding:20px; }
    .login-card { background:var(--white); border-radius:24px; padding:44px 40px; box-shadow:0 24px 80px rgba(0,0,0,0.5); }
    .login-logo { text-align:center; margin-bottom:30px; }
    .login-logo .nav-logo { justify-content:center; font-size:1.6rem; }
    .login-logo p { color:var(--muted); font-size:0.9rem; margin-top:6px; }
    .demo-note { background:rgba(192,57,43,0.08); border:1px solid var(--border); border-radius:10px; padding:12px 16px; font-size:0.82rem; color:var(--muted); margin-bottom:20px; text-align:center; }
    .demo-note strong { color:var(--red); }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <a href="../index.html" class="nav-logo">🩸 Life<span>Flow</span></a>
      <p>Admin Portal — Blood Bank Management</p>
    </div>
    <div class="demo-note">Demo credentials: <strong>admin@lifeflow.in</strong> / <strong>admin123</strong></div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="admin@lifeflow.in"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPass" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>
    <div id="loginAlert" class="alert"></div>
    <button class="btn-primary" style="width:100%;border-radius:12px;padding:14px;font-size:1rem;margin-top:6px" onclick="doLogin()">Login to Dashboard</button>
    <p style="text-align:center;margin-top:20px;font-size:0.88rem;color:var(--muted)">
      <a href="../index.html" style="color:var(--red);text-decoration:none;font-weight:600">← Back to Home</a>
    </p>
  </div>
</div>
<script src="../js/main.js"></script>
<script>
function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass = document.getElementById('loginPass').value;
  if (email === 'admin@lifeflow.in' && pass === 'admin123') {
    showAlert('loginAlert','success','✅ Login successful! Redirecting...');
    setTimeout(() => window.location.href = 'dashboard.html', 1200);
  } else {
    showAlert('loginAlert','error','❌ Invalid credentials. Try admin@lifeflow.in / admin123');
  }
}
</script>
</body>
</html>
